<!doctype html>

<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mystic Quest - Iniciar Sesión</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Design Tokens from Theme */
        --primary: #b4c5ff;
        --primary-container: #2563eb;
        --on-primary-container: #eeefff;
        --background: #0b1326;
        --surface: #0b1326;
        --surface-container: #171f33;
        --surface-container-high: #222a3d;
        --on-surface: #dae2fd;
        --on-surface-variant: #c3c6d7;
        --outline: #8d90a0;
        --outline-variant: #434655;
        --tertiary: #4edea3;

        --font-main: "Plus Jakarta Sans", sans-serif;
        --radius-xl: 0.75rem;
        --radius-2xl: 2rem;
        --margin-page: 2rem;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-main);
        background-color: var(--background);
        color: var(--on-surface);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        position: relative;
      }

      /* Background Layer */
      .background-container {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      .background-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.4;
        filter: grayscale(100%) brightness(0.8);
      }

      .background-overlay-gradient {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(to top, var(--background) 0%, transparent 70%),
          linear-gradient(
            to bottom,
            rgba(11, 19, 38, 0.4) 0%,
            transparent 100%
          ),
          radial-gradient(
            circle at center,
            rgba(37, 99, 235, 0.15) 0%,
            transparent 70%
          );
      }

      /* Main Content Layout */
      .main-content {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 1152px; /* 6xl */
        padding: 0 var(--margin-page);
        display: flex;
        flex-direction: column;
        gap: 3rem;
        align-items: center;
        justify-content: space-between;
      }

      @media (min-width: 768px) {
        .main-content {
          flex-direction: row;
          gap: 6rem;
        }
      }

      /* Hero Section */
      .hero-section {
        flex: 1;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      @media (min-width: 768px) {
        .hero-section {
          text-align: left;
          align-items: flex-start;
        }
      }

      .hero-logo {
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(37, 99, 235, 0.2);
        border: 1px solid rgba(180, 197, 255, 0.3);
        border-radius: 1rem;
        backdrop-filter: blur(4px);
      }

      .hero-logo .material-symbols-outlined {
        font-size: 60px;
        color: var(--primary);
        font-variation-settings: "FILL" 1;
      }

      .hero-title {
        font-size: 40px;
        font-weight: 700;
        line-height: 48px;
        letter-spacing: -0.02em;
        color: var(--on-surface);
      }

      .hero-title span {
        color: var(--primary);
      }

      .hero-description {
        font-size: 18px;
        line-height: 28px;
        color: var(--on-surface-variant);
        max-width: 448px;
      }

      .social-proof {
        display: flex;
        gap: 1rem;
        align-items: center;
        padding-top: 1rem;
      }

      .avatars {
        display: flex;
      }

      .avatar-img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid var(--background);
        margin-left: -12px;
      }

      .avatar-img:first-child {
        margin-left: 0;
      }

      .social-text {
        font-size: 14px;
        font-weight: 500;
        color: var(--on-surface-variant);
      }

      .social-text b {
        color: var(--primary);
      }

      /* Login Card */
      .login-container {
        width: 100%;
        max-width: 448px;
      }

      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 2.5rem;
        border-radius: var(--radius-2xl);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .card-header {
        margin-bottom: 2rem;
      }

      .card-title {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .card-subtitle {
        font-size: 16px;
        color: var(--on-surface-variant);
      }

      /* Form Styling */
      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--on-surface-variant);
        margin-bottom: 0.5rem;
        margin-left: 0.25rem;
      }

      .input-wrapper {
        position: relative;
      }

      .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--outline);
        font-size: 20px;
      }

      .form-input {
        width: 100%;
        background: rgba(23, 31, 51, 0.5);
        border: 1px solid var(--outline-variant);
        border-radius: var(--radius-xl);
        padding: 0.75rem 1rem 0.75rem 3rem;
        color: var(--on-surface);
        font-family: inherit;
        font-size: 16px;
        outline: none;
        transition: all 0.2s ease;
      }

      .form-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
      }

      .password-toggle {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--outline);
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
      }

      .password-toggle:hover {
        color: var(--on-surface);
      }

      .form-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 0.25rem;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-size: 14px;
        color: var(--on-surface-variant);
      }

      .remember-me:hover {
        color: var(--on-surface);
      }

      .checkbox {
        width: 20px;
        height: 20px;
        accent-color: var(--primary-container);
        cursor: pointer;
      }

      .forgot-link {
        font-size: 14px;
        color: var(--primary);
        text-decoration: none;
      }

      .forgot-link:hover {
        color: #dbe1ff;
      }

      .submit-btn {
        width: 100%;
        background: var(--primary-container);
        color: var(--on-primary-container);
        border: none;
        padding: 1rem;
        border-radius: var(--radius-xl);
        font-size: 24px;
        font-weight: 600;
        font-family: inherit;
        margin-top: 1.5rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: all 0.2s ease;
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
      }

      .submit-btn:hover {
        background: rgba(37, 99, 235, 0.9);
      }

      .submit-btn:active {
        transform: scale(0.98);
      }

      .divider-section {
        margin-top: 2.5rem;
        padding-top: 2rem;
        border-top: 1px solid rgba(67, 70, 85, 0.3);
        text-align: center;
        font-size: 16px;
        color: var(--on-surface-variant);
      }

      .register-link {
        color: var(--primary);
        font-weight: 700;
        text-decoration: none;
        margin-left: 0.25rem;
      }

      .register-link:hover {
        text-decoration: underline;
      }

      /* Footer Links */
      .footer-links {
        margin-top: 2rem;
        display: flex;
        justify-content: center;
        gap: 1.5rem;
      }

      .footer-link {
        font-size: 12px;
        font-weight: 600;
        color: var(--outline);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .footer-link:hover {
        color: var(--on-surface);
      }

      /* Atmospheric Elements */
      .float-icon {
        position: absolute;
        pointer-events: none;
      }

      .float-1 {
        bottom: 40px;
        left: 40px;
        opacity: 0.2;
        color: var(--primary);
        font-size: 8rem;
        animation: pulse 4s infinite alternate;
      }

      .float-2 {
        top: 80px;
        right: 80px;
        opacity: 0.1;
        color: var(--tertiary);
        font-size: 9rem;
      }

      @keyframes pulse {
        from {
          opacity: 0.1;
          transform: scale(1);
        }
        to {
          opacity: 0.3;
          transform: scale(1.1);
        }
      }

      .material-symbols-outlined.icon-large {
        font-variation-settings: "wght" 100;
      }
    </style>
  </head>
  <body>
    <!-- Background Layer -->
    <div class="background-container">
      <img
        alt="Mystical gothic castle silhouette"
        class="background-image"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxTR6p9zQP-AHAMd7Bk-SNXclag9L7Vjdwfjmz_y_wwTuAKh3z7oUhutl9dkRWUer4uR12sHe18Su6TAgQt6SPW0mezAYmXrBPIxatR9PDr27t0qMfWVHg0HIC31DyZEKO0DRF4QYWul2DZRaCs8_V69Am2UlP4ztXSK0dYksG3Rvuj4IDeavUTm3jEsBz8cxNqZMelUTv1XKDL7jnzdgD8uj11HGVfV3tyQNlXQ3a58qEYXZcQUuqnQoLb9nO0-gsm1dw0nFF4bI"
      />
      <div class="background-overlay-gradient"></div>
    </div>
    <!-- Main Content -->
    <main class="main-content">
      <!-- Hero Section -->
      <section class="hero-section">
        <div class="hero-logo">
          <span class="material-symbols-outlined">fort</span>
        </div>
        <h1 class="hero-title">Mystic <span>Quest</span></h1>
        <p class="hero-description">
          Adivina la palabra secreta y completa todos los niveles en este viaje
          épico de sabiduría y misterio.
        </p>
      </section>
      <!-- Login Section -->
      <section class="login-container">
        <div class="glass-panel">
          <header class="card-header">
            <h2 class="card-title">Iniciar sesión</h2>
            <p class="card-subtitle">
              Bienvenido de nuevo, valiente explorador.
            </p>
          </header>
          <form id="loginForm">
            <div class="form-group">
              <label class="form-label" for="username" >Usuario</label>
              <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">person</span>
                <input
                  class="form-input"
                  id="user-email"
                  placeholder="Correo electrónico"
                  required=""
                  type="text"
                />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="password">Contraseña</label>
              <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">lock</span>
                <input
                  class="form-input"
                  id="user-password"
                  placeholder="••••••••"
                  required=""
                  type="password"
                />
                <button
                  class="password-toggle"
                  onclick="togglePassword()"
                  type="button"
                >
                  <span class="material-symbols-outlined" id="eye-icon"
                    >visibility</span
                  >
                </button>
              </div>
            </div>
            <div class="form-footer">
            </div>
            <button class="submit-btn" type="submit" id="btn-signin">
              Iniciar aventura
              <span class="material-symbols-outlined">east</span>
            </button>
          </form>
          <div class="divider-section">
            <p>
              ¿Nuevo en el reino?
              <a class="register-link" href="{{url_for('signup')}}">Regístrate aquí</a>
            </p>
          </div>
        </div>
      </section>
    </main>
    <!-- Floating Atmosphere Elements -->
    <span class="material-symbols-outlined float-icon float-1 icon-large"
      >auto_awesome</span
    >
    <span class="material-symbols-outlined float-icon float-2 icon-large"
      >flare</span
    >
    <script src="{{ url_for('static', filename='js/mystic_quest/signin.js') }}"></script>    
    <script>
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eye-icon");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          eyeIcon.textContent = "visibility_off";
        } else {
          passwordInput.type = "password";
          eyeIcon.textContent = "visibility";
        }
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          console.log("Formulario enviado");
          // Aquí iría la lógica de autenticación
        });
    </script>
    

  </body>
</html>
