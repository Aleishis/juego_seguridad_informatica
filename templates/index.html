<!doctype html>

<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mystic Quest - Iniciar Sesión</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='css/mystic_quest/index.css') }}"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Background Layer -->
    <div class="background-container">
      <img
        alt="Mystical gothic castle silhouette"
        class="background-image"
        src="{{url_for('static', filename='images/site/index_background.png')}}"
      />
      <div class="background-overlay-gradient"></div>
    </div>
    <!-- Main Content -->
    <main class="main-content">
      <!-- Hero Section -->
      <section class="hero-section">
        <div class="hero-logo">
          <span class="material-symbols-outlined">fort</span>
        </div>
        <h1 class="hero-title">Mystic <span>Quest</span></h1>
        <p class="hero-description">
          Adivina la palabra secreta y completa todos los niveles en este viaje
          épico de sabiduría y misterio.
        </p>
      </section>
      <!-- Login Section -->
      <section class="login-container">
        <div class="glass-panel">
          <header class="card-header">
            <h2 class="card-title">Iniciar sesión</h2>
            <p class="card-subtitle">
              Bienvenido de nuevo, valiente explorador.
            </p>
          </header>
          <form id="loginForm">
            <div class="form-group">
              <label class="form-label" for="username" >Usuario</label>
              <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">person</span>
                <input
                  class="form-input"
                  id="user-email"
                  placeholder="Correo electrónico"
                  required=""
                  type="text"
                />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="password">Contraseña</label>
              <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">lock</span>
                <input
                  class="form-input"
                  id="user-password"
                  placeholder="••••••••"
                  required=""
                  type="password"
                />
                <button
                  class="password-toggle"
                  onclick="togglePassword()"
                  type="button"
                >
                  <span class="material-symbols-outlined" id="eye-icon"
                    >visibility</span
                  >
                </button>
              </div>
            </div>
            <div class="form-footer">
            </div>
            <button class="submit-btn" type="submit" id="btn-signin">
              Iniciar aventura
              <span class="material-symbols-outlined">east</span>
            </button>
          </form>
          <div class="divider-section">
            <p>
              ¿Nuevo en el reino?
              <a class="register-link" href="{{url_for('signup')}}">Regístrate aquí</a>
            </p>
          </div>
        </div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/mystic_quest/signin.js') }}"></script>    
    <script>
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eye-icon");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          eyeIcon.textContent = "visibility_off";
        } else {
          passwordInput.type = "password";
          eyeIcon.textContent = "visibility";
        }
      }
    </script>
    

  </body>
</html>
