<!doctype html>

<html class="dark" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mystic Quest - Bienvenido</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#434655",
              surface: "#0b1326",
              "on-primary": "#002a78",
              "inverse-primary": "#0053db",
              "tertiary-container": "#007d55",
              "surface-tint": "#b4c5ff",
              "surface-container-lowest": "#060e20",
              "primary-fixed": "#dbe1ff",
              "on-surface": "#dae2fd",
              "secondary-container": "#3131c0",
              "tertiary-fixed-dim": "#4edea3",
              "on-primary-container": "#eeefff",
              "on-error": "#690005",
              "on-tertiary-fixed": "#002113",
              "on-secondary-container": "#b0b2ff",
              "surface-variant": "#2d3449",
              "surface-bright": "#31394d",
              primary: "#b4c5ff",
              "primary-fixed-dim": "#b4c5ff",
              "on-secondary-fixed": "#07006c",
              "on-background": "#dae2fd",
              "tertiary-fixed": "#6ffbbe",
              tertiary: "#4edea3",
              error: "#ffb4ab",
              outline: "#8d90a0",
              "surface-container-high": "#222a3d",
              "on-primary-fixed": "#00174b",
              "on-error-container": "#ffdad6",
              "on-tertiary-fixed-variant": "#005236",
              "on-tertiary-container": "#bdffdb",
              "surface-container-highest": "#2d3449",
              "secondary-fixed-dim": "#c0c1ff",
              "on-surface-variant": "#c3c6d7",
              "inverse-surface": "#dae2fd",
              "surface-container": "#171f33",
              "secondary-fixed": "#e1e0ff",
              background: "#0b1326",
              secondary: "#c0c1ff",
              "error-container": "#93000a",
              "on-tertiary": "#003824",
              "surface-dim": "#0b1326",
              "inverse-on-surface": "#283044",
              "primary-container": "#2563eb",
              "on-secondary-fixed-variant": "#2f2ebe",
              "on-primary-fixed-variant": "#003ea8",
              "surface-container-low": "#131b2e",
              "on-secondary": "#1000a9",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "container-padding": "1.5rem",
              "table-row-height": "64px",
              "gutter-md": "1.5rem",
              "margin-page": "2rem",
              base: "4px",
            },
            fontFamily: {
              "label-sm": ["Plus Jakarta Sans"],
              "label-md": ["Plus Jakarta Sans"],
              "headline-xl": ["Plus Jakarta Sans"],
              "headline-md-mobile": ["Plus Jakarta Sans"],
              "body-md": ["Plus Jakarta Sans"],
              "body-lg": ["Plus Jakarta Sans"],
              "headline-md": ["Plus Jakarta Sans"],
              "headline-lg": ["Plus Jakarta Sans"],
            },
            fontSize: {
              "label-sm": ["12px", { lineHeight: "16px", fontWeight: "600" }],
              "label-md": [
                "14px",
                {
                  lineHeight: "20px",
                  letterSpacing: "0.01em",
                  fontWeight: "500",
                },
              ],
              "headline-xl": [
                "40px",
                {
                  lineHeight: "48px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "headline-md-mobile": [
                "20px",
                { lineHeight: "28px", fontWeight: "600" },
              ],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "headline-lg": [
                "32px",
                { lineHeight: "40px", fontWeight: "700" },
              ],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      .glass-card {
        background: rgba(23, 31, 51, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .gradient-bg {
        background: radial-gradient(circle at top, #131b2e 0%, #0b1326 100%);
      }
      .glow-button {
        box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background min-h-screen font-body-md gradient-bg selection:bg-primary selection:text-on-primary"
  >
    <!-- TopAppBar -->
    <header
      class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding bg-surface/70 backdrop-blur-xl border-b border-white/10 shadow-sm h-20"
    >
      <div class="flex items-center gap-2">
        <span class="font-headline-md text-primary tracking-tight font-bold"
          >Mystic Quest</span
        >
      </div>
      <div class="flex items-center gap-4">
        <div
          class="flex items-center gap-2 px-4 py-2 rounded-full border border-white/10 hover:bg-surface-variant transition-colors cursor-pointer group"
        >
          <span
            class="material-symbols-outlined text-on-surface-variant group-hover:text-primary"
            >leaderboard</span
          ><span
            class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface"
            >Clasificaciones</span
          >
        </div>
        <div class="relative">
          <!-- Botón usuario -->
          <button
            id="user-menu-button"
            class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface-container hover:bg-surface-variant transition-colors cursor-pointer group"
          >
            <span
              class="material-symbols-outlined text-on-surface-variant group-hover:text-primary"
            >
              account_circle
            </span>

            <span
              class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface"
            >
              {{ current_user.name }}
            </span>

            <span
              class="material-symbols-outlined text-on-surface-variant text-[18px]"
            >
              expand_more
            </span>
          </button>

          <!-- Dropdown -->
          <div
            id="user-dropdown"
            class="hidden absolute right-0 mt-2 w-52 rounded-xl bg-surface-container border border-white/10 shadow-2xl overflow-hidden"
          >
            <a
              href="/logout"
              class="flex items-center gap-3 px-4 py-3 hover:bg-surface-variant transition-colors text-on-surface"
            >
              <span class="material-symbols-outlined text-[20px]">
                logout
              </span>

              <span>Cerrar sesión</span>
            </a>
          </div>
        </div>
      </div>
    </header>
    <!-- Main Content Canvas -->
    <main
      class="flex flex-col items-center justify-center h-screen px-container-padding text-center overflow-hidden pt-20"
    >
      <!-- Welcome Hero Section -->
      <div class="max-w-4xl w-full flex flex-col items-center gap-4 py-4">
        <!-- Title Cluster -->
        <div class="space-y-4">
          <h1
            class="font-headline-xl text-headline-xl text-on-surface tracking-tight"
          >
            ¡Bienvenido, {{current_user.name}}!
          </h1>
          <p
            class="font-body-lg text-body-lg text-on-surface-variant max-w-lg mx-auto"
          >
            ¿Listo para comenzar la aventura? Un mundo de misterios y tesoros
            antiguos te espera en las Tierras Sombrías.
          </p>
        </div>
        <!-- Hero Illustration Container -->
        <div
          class="relative w-full max-w-xl h-[320px] rounded-3xl overflow-hidden glass-card shadow-2xl group"
        >
          <!-- Background Image Placeholder -->
          <img
            alt="Escena épica de Mystic Quest"
            class="w-full h-full object-cover opacity-90 group-hover:scale-105 transition-transform duration-700"
            data-alt="A cinematic, high-fantasy digital painting of a glowing, legendary sword embedded in an ancient stone altar. The altar sits atop a grassy hill overlooking a vast range of jagged, misty mountains under a deep indigo twilight sky. Ethereal magical particles and soft purple starlight illuminate the scene, creating a sense of wonder and mystery. The visual style is polished and modern, consistent with a high-end adventure game dashboard."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuD9umQymxpTcr_W_9zbglm5krlS2TeI-Hqi8ZEYC9PS-E_TqsWYKmIGZNsCiigfXxfHgWISiblgXS8qV7FnkXIo75Gif5LBOc4DfUo2_069GyUbn_2lcfU8x79IkvWwVyOzEEwmYukM2v0VFYwcLSyZ_n_jnNoTjXQDWBogxihiiKgtTu0feRvDfpjhlqTTZxk6htXVPy-rqGlR7VWL2gPRme_7jBRVVDxWzqwW7OVv_rAtbWhb6LsitAhx8pA7HDgFXmKN9O1Uzkk"
          />
          <!-- Atmospheric Overlay -->
          <div
            class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest/80 via-transparent to-transparent pointer-events-none"
          ></div>
          <!-- Floating Item Glow Effect -->
          <div class="absolute inset-0 flex items-center justify-center">
            <div
              class="w-64 h-64 bg-primary/10 rounded-full blur-[80px] animate-pulse"
            ></div>
          </div>
        </div>
        <!-- Primary Action Button -->
        <div class="mt-4">
          <button
            class="group flex items-center gap-3 px-8 py-4 bg-[#10B981] hover:bg-[#059669] text-white font-headline-md rounded-xl transition-all duration-300 transform hover:scale-105 active:scale-95 glow-button"
            id="btn-play"
            >
            <span class="material-symbols-outlined" data-weight="fill"
              >play_arrow</span
            >
            <span>Iniciar nueva partida</span>
          </button>
        </div>
      </div>
    </main>

    <script>
      const userMenuButton = document.getElementById("user-menu-button");
      const userDropdown = document.getElementById("user-dropdown");

      userMenuButton.addEventListener("click", () => {
        userDropdown.classList.toggle("hidden");
      });

      // cerrar al clickear afuera
      document.addEventListener("click", (event) => {
        if (
          !userMenuButton.contains(event.target) &&
          !userDropdown.contains(event.target)
        ) {
          userDropdown.classList.add("hidden");
        }
      });
    </script>
    <script src="{{ url_for('static', filename='js/mystic_quest/welcome.js') }}"></script>
  </body>
</html>
