<!doctype html>

<html class="dark" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mystic Quest - Registro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #0b1326;
      }
      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .input-glow:focus-within {
        box-shadow: 0 0 15px rgba(37, 99, 235, 0.2);
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "#0b1326",
              "on-secondary": "#1000a9",
              "surface-dim": "#0b1326",
              primary: "#b4c5ff",
              "on-tertiary": "#003824",
              "on-secondary-fixed": "#07006c",
              "secondary-fixed": "#e1e0ff",
              "outline-variant": "#434655",
              "surface-container-lowest": "#060e20",
              tertiary: "#4edea3",
              "inverse-on-surface": "#283044",
              "surface-bright": "#31394d",
              "on-surface-variant": "#c3c6d7",
              "on-tertiary-container": "#bdffdb",
              "on-secondary-container": "#b0b2ff",
              "on-error-container": "#ffdad6",
              "primary-fixed": "#dbe1ff",
              "on-tertiary-fixed": "#002113",
              "secondary-fixed-dim": "#c0c1ff",
              "inverse-primary": "#0053db",
              secondary: "#c0c1ff",
              "on-secondary-fixed-variant": "#2f2ebe",
              "surface-tint": "#b4c5ff",
              "on-primary-fixed-variant": "#003ea8",
              "inverse-surface": "#dae2fd",
              "primary-container": "#2563eb",
              "on-primary-fixed": "#00174b",
              "on-error": "#690005",
              "surface-container-high": "#222a3d",
              "on-primary-container": "#eeefff",
              "primary-fixed-dim": "#b4c5ff",
              "surface-container-highest": "#2d3449",
              outline: "#8d90a0",
              surface: "#0b1326",
              "tertiary-container": "#007d55",
              "on-background": "#dae2fd",
              "surface-variant": "#2d3449",
              "surface-container": "#171f33",
              "on-tertiary-fixed-variant": "#005236",
              "error-container": "#93000a",
              "secondary-container": "#3131c0",
              "on-surface": "#dae2fd",
              "tertiary-fixed": "#6ffbbe",
              "on-primary": "#002a78",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "gutter-md": "1.5rem",
              "container-padding": "1.5rem",
              "margin-page": "2rem",
              base: "4px",
              "table-row-height": "64px",
            },
            fontFamily: {
              "label-md": ["Plus Jakarta Sans"],
              "body-lg": ["Plus Jakarta Sans"],
              "headline-md": ["Plus Jakarta Sans"],
              "body-md": ["Plus Jakarta Sans"],
              "label-sm": ["Plus Jakarta Sans"],
              "headline-lg": ["Plus Jakarta Sans"],
              "headline-xl": ["Plus Jakarta Sans"],
              "headline-md-mobile": ["Plus Jakarta Sans"],
            },
            fontSize: {
              "label-md": [
                "14px",
                {
                  lineHeight: "20px",
                  letterSpacing: "0.01em",
                  fontWeight: "500",
                },
              ],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "label-sm": ["12px", { lineHeight: "16px", fontWeight: "600" }],
              "headline-lg": [
                "32px",
                { lineHeight: "40px", fontWeight: "700" },
              ],
              "headline-xl": [
                "40px",
                {
                  lineHeight: "48px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "headline-md-mobile": [
                "20px",
                { lineHeight: "28px", fontWeight: "600" },
              ],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden"
  >
    <!-- Atmospheric Background -->
    <div class="absolute inset-0 z-0">
      <img
        alt="Moonlit fantasy castle"
        class="w-full h-full object-cover opacity-40"
        data-alt="A cinematic, low-angle shot of a towering gothic castle perched on a jagged cliffside under a brilliant full moon. The atmosphere is thick with a magical navy mist and swirling purple ethereal clouds. High-contrast moonbeams cut through the darkness, illuminating the intricate stone textures of the spires. The color palette is dominated by deep twilight blues and obsidian blacks, perfectly capturing a modern dark fantasy aesthetic with a professional cinematic finish."
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCScEc-6ezzJDg_Dvy2wf_mlGkNrLeE_0Q8-sHF0-eT_XqoM5JJ4wRVkXET-ZMCe_jRdpsoLch1taHFAjRBbAgePdvJFtPjyGKAw508PXmkB9WFOqX9X26V00xvS1To8siHyv3a9EMKwKpglgKH2EqLH08vSuWlVAZsOseZJThHw8eZTZlxD5NejWIixIp32NN0FWbla-L0UTWUKPTgjUEHGpauQ1l-0nVxVO0gYLmERVVOreS3PsW-NH_omz8vF25JhD9L477sU0w"
      />
      <div
        class="absolute inset-0 bg-gradient-to-b from-background/20 via-background/60 to-background"
      ></div>
    </div>
    <!-- Signup Container -->
    <main class="relative z-10 w-full max-w-md px-6 py-12">
      <div class="glass-panel rounded-xl p-8 shadow-2xl">
        <!-- Brand Header -->
        <div class="text-center mb-8">
          <h1
            class="font-headline-lg text-headline-lg text-primary tracking-tight mb-2"
          >
            Mystic Quest
          </h1>
          <p
            class="font-body-md text-body-md text-on-surface-variant opacity-80"
          >
            Comienza tu viaje legendario hoy mismo
          </p>
        </div>
        <!-- Form -->
        <form id="signup-form" class="space-y-5">
          <!-- Name Field -->
          <div class="space-y-2">
            <label
              class="font-label-md text-label-md text-on-surface-variant block ml-1"
              for="name"
              >Nombre</label
            >
            <div
              class="relative input-glow rounded-lg transition-all duration-200"
            >
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]"
                >person</span
              >
              <input
                class="w-full bg-surface-container/50 border border-outline-variant text-on-surface rounded-lg py-3 pl-11 pr-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md"
                id="user-name"
                name="name"
                placeholder="Tu nombre de guerrero"
                type="text"
              />
            </div>
          </div>
          <!-- Email Field -->
          <div class="space-y-2">
            <label
              class="font-label-md text-label-md text-on-surface-variant block ml-1"
              for="email"
              >Correo electrónico</label
            >
            <div
              class="relative input-glow rounded-lg transition-all duration-200"
            >
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]"
                >mail</span
              >
              <input
                class="w-full bg-surface-container/50 border border-outline-variant text-on-surface rounded-lg py-3 pl-11 pr-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md"
                id="user-email"
                name="email"
                placeholder="correo@ejemplo.com"
                type="email"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-2">
            <label
              class="font-label-md text-label-md text-on-surface-variant block ml-1"
              for="password"
              >Contraseña</label
            >
            <div
              class="relative input-glow rounded-lg transition-all duration-200"
            >
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]"
                >lock</span
              >
              <input
                class="w-full bg-surface-container/50 border border-outline-variant text-on-surface rounded-lg py-3 pl-11 pr-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md"
                id="user-password"
                name="password"
                placeholder="••••••••"
                type="password"
              />
            </div>
          </div>
          <!-- Repeat Password Field -->
          <div class="space-y-2">
            <label
              class="font-label-md text-label-md text-on-surface-variant block ml-1"
              for="repeat-password"
              >Repetir contraseña</label
            >
            <div
              class="relative input-glow rounded-lg transition-all duration-200"
            >
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]"
                >lock_reset</span
              >
              <input
                class="w-full bg-surface-container/50 border border-outline-variant text-on-surface rounded-lg py-3 pl-11 pr-4 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md"
                id="user-repeat-password"
                name="repeat-password"
                placeholder="••••••••"
                type="password"
              />
            </div>
          </div>
          <!-- Action Button -->
          <div class="pt-4">
            <button
              class="w-full bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-label-md text-label-md py-4 rounded-xl shadow-lg transition-all active:scale-[0.98] flex justify-center items-center gap-2"
              type="submit"
              id="btn-signup"
            >
              <span>Crear cuenta</span>
              <span class="material-symbols-outlined text-[18px]">swords</span>
            </button>
          </div>
        </form>
        <!-- Footer Link -->
        <div class="mt-8 text-center">
          <p class="font-body-md text-body-md text-on-surface-variant">
            ¿Ya tienes cuenta?
            <a
              class="text-primary hover:text-primary-fixed-dim font-bold ml-1 transition-colors underline underline-offset-4 decoration-primary/30"
              href="{{url_for('index')}}"
            >
              Inicia sesión aquí
            </a>
          </p>
        </div>
      </div>
      <!-- Decorative Elements -->
      <div class="mt-8 flex justify-center gap-6 opacity-40">
        <div class="flex items-center gap-1">
          <span class="material-symbols-outlined text-primary text-[20px]"
            >verified_user</span
          >
          <span class="font-label-sm text-label-sm text-on-surface"
            >Secure Vault</span
          >
        </div>
        <div class="flex items-center gap-1">
          <span class="material-symbols-outlined text-primary text-[20px]"
            >auto_awesome</span
          >
          <span class="font-label-sm text-label-sm text-on-surface"
            >Instant Access</span
          >
        </div>
      </div>
    </main>
    <!-- Background Glow Effects -->
    <div
      class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"
    ></div>
    <div
      class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-tertiary/5 rounded-full blur-[120px] pointer-events-none"
    ></div>

    <script src="{{ url_for('static', filename='js/mystic_quest/signup.js') }}"></script>   

  </body>
</html>
